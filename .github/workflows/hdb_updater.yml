name: Weekly HDB Data Auto-Update

# 1. This sets the CRON clock to run every Friday at 9:00 AM Singapore Time (1:00 AM UTC)
on:
  schedule:
    - cron: '0 1 * * 5'
  workflow_dispatch: # This adds a manual "Run Now" button inside GitHub just in case

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    # Step A: Copy your repository files onto GitHub's cloud computer
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step B: Set up Python on the cloud computer
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node: '3.11'

    # Step C: Install the required tools (pandas, pyarrow, requests)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step D: Execute your python script to fetch the data
    - name: Run HDB Data Extraction Script
      run: python get_hdb_data.py

    # Step E: Automatically save and push the new parquet file back to your GitHub repo
    - name: Commit and Push changes to GitHub
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add data/latest_hdb_resale_prices.parquet
        git commit -m "Automated Weekly HDB Data Update [Skip CI]" || echo "No changes detected"
        git push
